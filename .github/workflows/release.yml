name: Release

on:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node-gyp and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.node-gyp
            ~/.npm/_prebuilds
            build/
          key: ${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json', '**/binding.gyp') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-
            ${{ runner.os }}-

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev clang-format

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install clang-format || true

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm --version=17.0.6 --no-progress || true
        shell: pwsh

      - name: Install npm dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Package binary
        run: npx node-pre-gyp package

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-node${{ matrix.node-version }}
          path: build/stage/*.tar.gz
          retention-days: 1

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Run release (bump version and changelog)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git describe --tags --abbrev=0 2>/dev/null)" ]; then
            echo "No previous tag found, creating initial release"
            npm run release -- --first-release
          else
            npm run release
          fi

      - name: Get new version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: Collect binaries
        run: |
          mkdir -p release-binaries
          find binaries -name "*.tar.gz" -exec cp {} release-binaries/ \;
          ls -la release-binaries/

      - name: Push version bump and tag
        run: |
          git push --follow-tags origin ${{ github.ref_name }}

      - name: Create GitHub Release with binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.get_version.outputs.version }}" \
            --title "v${{ steps.get_version.outputs.version }}" \
            --generate-notes \
            release-binaries/*.tar.gz

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
