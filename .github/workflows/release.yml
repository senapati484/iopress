name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install clang-format || true

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm --version=17.0.6 --no-progress || true
        shell: pwsh

      - name: Cache node-gyp and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.node-gyp
            ~/.npm/_prebuilds
            build/
          key: ${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json', '**/binding.gyp') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-
            ${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Package binary
        run: npx node-pre-gyp package

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-node${{ matrix.node-version }}
          path: build/stage/*.tar.gz
          retention-days: 1

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: Collect binaries
        run: |
          mkdir -p release-binaries
          find binaries -name "*.tar.gz" -exec cp {} release-binaries/ \;
          ls -la release-binaries/

      - name: Create GitHub Release with binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            release-binaries/*.tar.gz

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
