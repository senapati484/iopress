name: NPM Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      current_version: ${{ steps.check.outputs.current_version }}
      latest_npm_version: ${{ steps.check.outputs.latest_npm_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 liburing-dev

      - name: Get current version from package.json
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get latest version from npm
        id: npm
        run: |
          LATEST=$(npm view @iopress/core version 2>/dev/null || echo "0.0.0")
          echo "latest_npm_version=$LATEST" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: check
        run: |
          CURRENT="${{ steps.package.outputs.current_version }}"
          LATEST="${{ steps.npm.outputs.latest_npm_version }}"
          
          echo "current_version=$CURRENT"
          echo "latest_npm_version=$LATEST"
          
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No version change detected. Skipping release."
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Version change detected: $LATEST -> $CURRENT"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 liburing-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build
        continue-on-error: true

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Create GitHub Release
        if: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.current_version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
