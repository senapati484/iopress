name: NPM Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    name: check-version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      current_version: ${{ steps.check.outputs.current_version }}
      latest_npm_version: ${{ steps.check.outputs.latest_npm_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get current version from package.json
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get latest version from npm
        id: npm
        run: |
          LATEST=$(npm view @iopress/core version 2>/dev/null || echo "0.0.0")
          echo "latest_npm_version=$LATEST" >> $GITHUB_OUTPUT

      - name: Compare versions and report
        id: check
        run: |
          CURRENT="${{ steps.package.outputs.current_version }}"
          LATEST="${{ steps.npm.outputs.latest_npm_version }}"

          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest_npm_version=$LATEST" >> $GITHUB_OUTPUT

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "### ✅ Version Check" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| **package.json** | \`$CURRENT\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **npm latest** | \`$LATEST\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Status** | 🔵 No version change — release not needed |" >> $GITHUB_STEP_SUMMARY
            echo "No version change detected ($LATEST). Release not needed."
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "### ✅ Version Check" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| **package.json** | \`$CURRENT\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **npm latest** | \`$LATEST\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Status** | 🟢 Version bumped — release available (\`$LATEST\` → \`$CURRENT\`) |" >> $GITHUB_STEP_SUMMARY
            echo "Version bumped: $LATEST → $CURRENT. A release could be triggered."
          fi
