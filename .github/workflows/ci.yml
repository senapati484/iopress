name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build

      - name: Run tests
        # Windows native build may have environment-specific failures;
        # allow the job to continue so other steps report their status.
        continue-on-error: ${{ runner.os == 'Windows' }}
        timeout-minutes: 5
        run: npm test

      - name: Run benchmark regression test
        if: runner.os != 'Windows'
        run: npm run bench:ci
        timeout-minutes: 2
